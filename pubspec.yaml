name: hamster_stash
description: "Hamster's Stash - Personal Finance Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Network
  dio: ^5.7.0
  dio_smart_retry: ^7.0.1

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Auth
  local_auth: ^2.3.0

  # Camera & Scanning
  camera: ^0.11.1
  google_mlkit_barcode_scanning: ^0.12.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Calendar
  table_calendar: ^3.2.0

  # CSV
  csv: ^6.0.0

  # Share
  share_plus: ^10.1.4

  # Home Widget
  home_widget: ^0.7.0

  # Utils
  intl: ^0.20.0
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

  # Linting
  very_good_analysis: ^6.0.0

  # Testing
  mocktail: ^1.0.4

  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
